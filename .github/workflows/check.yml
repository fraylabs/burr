name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core:
    name: Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install
        run: npm install

      - name: Sync Python workspace
        run: uv sync --all-packages

      - name: Check
        run: npm run check

  build123d:
    name: Build123d Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install Node dependencies
        run: npm install

      - name: Sync Python workspace
        run: uv sync --all-packages

      - name: Check build123d examples
        run: npm run check:build123d

      - name: Check optional OCP STEP backend
        run: npm run check:ocp

      - name: Check mixed-intent CAD proof
        run: npm run check:mixed-intent

      - name: Confirm generated artifacts are untracked
        run: |
          test -z "$(git status --short --untracked-files=no)"
