[project]
name = "burr-ocp"
version = "0.1.0"
description = "Optional OpenCascade STEP geometry extractors for Burr."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "cadquery-ocp-novtk>=7.8.1",
]
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Fray Labs" }]
keywords = ["cad", "step", "opencascade", "dfm", "mechanical-design"]

[project.scripts]
burr-ocp-step-cylinders = "burr_ocp.step_cylinders:main"

[project.urls]
Homepage = "https://github.com/fraylabs/burr"
Repository = "https://github.com/fraylabs/burr"
Issues = "https://github.com/fraylabs/burr/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/burr_ocp"]
